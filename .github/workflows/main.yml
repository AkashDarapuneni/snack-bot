name: Snack Monitor Bot

on:
  schedule:
    # Runs every 15 mins between 4:00 PM and 5:00 PM IST (10:30-11:30 UTC)
    - cron: '30,45,00,15 10,11 * * *'
  workflow_dispatch: # Allows you to test it manually anytime

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          # This installs the browser needed to read React sites
          playwright install chromium --with-deps

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot.py
