name: Snack Monitor Bot

on:
  schedule:
    # Runs every 15 mins between 4:00 PM and 5:00 PM IST (10:30-11:30 UTC)
    - cron: '30,45,00,15 10,11 * * *'
  workflow_dispatch: # Manual trigger button

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated to v4 for Node.js 24 compatibility

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # This installs the browser AND the system libraries needed to run it
          python -m playwright install chromium --with-deps

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          # This fixes common errors in headless environments
          QT_QPA_PLATFORM: offscreen 
        run: python bot.py
