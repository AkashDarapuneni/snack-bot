name: Snack Monitor Bot

on:
  schedule:
    # Runs every 15 mins during the evening window (IST)
    - cron: '30,45,00,15 10,11 * * *'
  workflow_dispatch: # Allows you to press "Run Workflow" to test

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          # This installs the actual browser and the Linux system dependencies
          python -m playwright install chromium --with-deps

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot.py
